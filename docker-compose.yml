services:
  app:
    build: .
    container_name: machino
    # Kein ports-Mapping — Traefik routet direkt ins Netz
    expose:
      - "8080"
    environment:
      - DATABASE_PATH=/data/machino.db
      - STATIC_DIR=/app/web/dist
      - HTTP_ADDR=:8080
      # Registrierung deaktivieren sobald alle Accounts erstellt sind
      - REGISTRATION_ENABLED=${REGISTRATION_ENABLED:-true}
      # Traefik terminiert TLS → Cookies müssen Secure sein
      - COOKIE_SECURE=true
      # SMTP-Konfiguration (optional — ohne SMTP läuft der Demo-Modus)
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-}
      # Logging (json empfohlen für Log-Aggregatoren)
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FORMAT=${LOG_FORMAT:-json}
    labels:
      - "traefik.enable=true"
      # Hostname anpassen: z.B. machino.example.com
      - "traefik.http.routers.machino.rule=Host(`${APP_DOMAIN:-machino.localhost}`)"
      - "traefik.http.routers.machino.entrypoints=websecure"
      - "traefik.http.routers.machino.tls=true"
      - "traefik.http.routers.machino.tls.certresolver=letsencrypt"
      - "traefik.http.services.machino.loadbalancer.server.port=8080"
      # HTTP → HTTPS Redirect
      - "traefik.http.routers.machino-http.rule=Host(`${APP_DOMAIN:-machino.localhost}`)"
      - "traefik.http.routers.machino-http.entrypoints=web"
      - "traefik.http.routers.machino-http.middlewares=redirect-https"
      - "traefik.http.middlewares.redirect-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-https.redirectscheme.permanent=true"
    volumes:
      - machino_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - traefik-public

volumes:
  machino_data:

networks:
  # Muss mit dem Traefik-Netzwerk übereinstimmen
  # Erstellen mit: docker network create traefik-public
  traefik-public:
    external: true
